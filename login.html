<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"  rel="stylesheet"/>
    <link rel="stylesheet" href="styles/login.css"/>
    <title>Tela de Login</title>
</head>
<body>
    <main class="bloco">
        <form id="registroForm">
      <form>
            <h1>Login do Projeto</h1>

            <div class="input-box">
                <input id="email" placeholder="E-mail" type="email" required/>
                <i class="bx bxs-envelope"></i>
            </div>

            <div class="input-box">
                <input id="senha" placeholder="Senha" type="password" required/>
                <i class="bx bxs-lock-alt"></i>
                <span id="forcaSenha" style="display: block; margin-top: 5px; font-weight: bold;"></span>
            </div>

            <button type="submit" class="login" disabled id="submitButton">Logar</button>
            <div class="login-link">
                <p>Não possui uma Conta?<a href="registro.html">Registrar</a></p>
            </div>
        </form>
    </main>
</html>
