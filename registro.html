
<!DOCTYPE html>
<html lang="pt-Br"></html>
<html>
  <head>
    <title>Registrar</title>
      <link rel="stylesheet" href="styles/registro.css"/>
      <link rel="icon" type="" href="img/livro.jpg"/>
</head>

  <body>
<div class="container">
        <div class="form-image">
          <img src="img/livro.jpg">
        </div>

  <div class="form">
    <form method="post" action = "registro.html">
			<div class="titulo"><h1>Estudando ...</h1></div>
      <div class="form-header">
        <div class="title">
          <h1>Cadastro</h1>
        </div>
        <div class="login-button">
          <button><a href="login.html">Logar</a></button>
        </div>
      </div>

      <div class="input-group">
        <div class="input-box">
          <label for="nome">Nome</label>
          <input type="text" id="name" name="name" placeholder="Digite seu nome" required>
        </div>
        
        <div class="input-box">
          <label for="telefone">Telefone</label>
          <input type="tel" id="number" name="number" placeholder="Digite seu telefone" required>
        </div>
        
        <div class="input-box">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Digite seu email" required>
        </div>
        
        <div class="input-box">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
        </div>
      </div>
        <div class="continue-button">
          <input type="submit" name="acao" href="inicio.html" value="Entrar">
        </div>
    </form>
  </div>
</div>
  </body>
</html>
