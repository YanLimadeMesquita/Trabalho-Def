<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"  rel="stylesheet"/>
    <link rel="stylesheet" href="styles/registro.css"/>
    <title>Tela de Registro</title>
</head>
<body>
    <main class="bloco">
        <form id="registroForm">
      <form>
            <h1>Registro (Nome do Site)</h1>

            <div class="input-box">
                <input id="usuario" placeholder="Usuário" type="text" required/>
                <i class="bx bxs-user"></i>
            </div>

            <div class="input-box">
                <input id="email" placeholder="E-mail" type="email" required/>
                <i class="bx bxs-envelope"></i>
            </div>

            <div class="input-box">
                <input id="nomeCompleto" placeholder="Nome Completo" type="text" required/>
                <i class="bx bxs-skull"></i>
            </div>

            <div class="input-box">
                <input id="telefone" placeholder="Telefone" type="tel" required/>
                <i class="bx bx-phone-call"></i>
            </div>

            <div class="input-box">
                <input id="senha" placeholder="Senha" type="password" required/>
                <i class="bx bxs-lock-alt"></i>
                <span id="forcaSenha" style="display: block; margin-top: 5px; font-weight: bold;"></span>
            </div>

            <div class="input-box">
                <input id="confirmarSenha" placeholder="Confirmar Senha" type="password" required/>
                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="remmember-forgot">
                <label>
                    <input type="checkbox" />
                    Lembrar Senha
                </label>
            </div>

            <button type="submit" class="login" disabled id="submitButton">Registrar</button>
            <div class="login-link">
                <p>Já possui uma Conta?<a href="#">Logar</a></p>
            </div>
        </form>
    </main>
